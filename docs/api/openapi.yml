openapi: 3.0.3
info:
  title: AgentProof API
  version: 0.1.0
  description: Reliability, evaluation, observability, and governance API for AI applications.
paths:
  /api/v1/api-keys/{api_key_id}/revoke/:
    post:
      operationId: api_keys_revoke_create
      description: Revoke an API key.
      parameters:
      - in: path
        name: api_key_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - api-keys
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKey'
          description: ''
  /api/v1/environments/{environment_id}/:
    get:
      operationId: environments_retrieve
      description: Retrieve or update an environment.
      parameters:
      - in: path
        name: environment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - environments
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
          description: ''
    patch:
      operationId: environments_partial_update
      description: Retrieve or update an environment.
      parameters:
      - in: path
        name: environment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - environments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEnvironmentUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEnvironmentUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEnvironmentUpdateRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
          description: ''
  /api/v1/environments/{environment_id}/api-keys/:
    get:
      operationId: environments_api_keys_list
      description: List or create API keys for an environment
      parameters:
      - in: path
        name: environment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - environments
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/APIKey'
          description: ''
    post:
      operationId: environments_api_keys_create
      description: List or create API keys for an environment
      parameters:
      - in: path
        name: environment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - environments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APIKeyCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/APIKeyCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/APIKeyCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyCreationResponse'
          description: ''
  /api/v1/environments/{environment_id}/auth-check/:
    post:
      operationId: environments_auth_check_create
      description: Minimal protected endpoint proving API-key auth works.
      parameters:
      - in: path
        name: environment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - environments
      security:
      - EnvironmentAPIKeyAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIKeyAuthCheck'
          description: ''
  /api/v1/invitations/accept/:
    post:
      operationId: invitations_accept_create
      description: Accept an organization invitation.
      tags:
      - invitations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
          description: ''
  /api/v1/organizations/:
    get:
      operationId: organizations_list
      description: List memberships or create an organization.
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Membership'
          description: ''
    post:
      operationId: organizations_create
      description: List memberships or create an organization.
      tags:
      - organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
          description: ''
  /api/v1/organizations/{organization_id}/:
    get:
      operationId: organizations_retrieve
      description: Return the currently selected organization.
      parameters:
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
  /api/v1/organizations/{organization_id}/invitations/:
    get:
      operationId: organizations_invitations_list
      description: List or create organization invitations.
      parameters:
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invitation'
          description: ''
    post:
      operationId: organizations_invitations_create
      description: List or create organization invitations.
      parameters:
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InvitationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InvitationCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
          description: ''
  /api/v1/organizations/{organization_id}/invitations/{invitation_id}/revoke/:
    post:
      operationId: organizations_invitations_revoke_create
      description: Revoke an unresolved invitation.
      parameters:
      - in: path
        name: invitation_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
          description: ''
  /api/v1/organizations/{organization_id}/members/:
    get:
      operationId: organizations_members_list
      description: List members in the current organization.
      parameters:
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Membership'
          description: ''
  /api/v1/organizations/{organization_id}/members/{membership_id}/:
    patch:
      operationId: organizations_members_partial_update
      description: Update or remove one membership.
      parameters:
      - in: path
        name: membership_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
          description: ''
    delete:
      operationId: organizations_members_destroy
      description: Update or remove one membership.
      parameters:
      - in: path
        name: membership_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/organizations/{organization_id}/switch/:
    post:
      operationId: organizations_switch_create
      description: Set an organization as the active session tenant.
      parameters:
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
          description: ''
  /api/v1/organizations/current/:
    get:
      operationId: organizations_current_retrieve
      description: Return the selected organization membership.
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
          description: ''
  /api/v1/projects/:
    get:
      operationId: projects_list
      description: List or create projects for the active organization.
      tags:
      - projects
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
          description: ''
    post:
      operationId: projects_create
      description: List or create projects for the active organization.
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectCreationResponse'
          description: ''
  /api/v1/projects/{project_id}/:
    get:
      operationId: projects_retrieve
      description: Retrieve or update a project
      parameters:
      - in: path
        name: project_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
    patch:
      operationId: projects_partial_update
      description: Retrieve or update a project
      parameters:
      - in: path
        name: project_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProjectUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProjectUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProjectUpdateRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
  /api/v1/projects/{project_id}/environments/:
    get:
      operationId: projects_environments_list
      description: List or create environments under a project.
      parameters:
      - in: path
        name: project_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Environment'
          description: ''
    post:
      operationId: projects_environments_create
      description: List or create environments under a project.
      parameters:
      - in: path
        name: project_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvironmentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EnvironmentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EnvironmentCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
          description: ''
  /api/v1/status/:
    get:
      operationId: get_service_status
      description: Return the public API status
      tags:
      - status
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
          description: ''
components:
  schemas:
    APIKey:
      type: object
      description: API key representation that never exposes hash or plaintext
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization_id:
          type: string
          format: uuid
          readOnly: true
        project_id:
          type: string
          format: uuid
          readOnly: true
        environment_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        prefix:
          type: string
          readOnly: true
        scopes:
          readOnly: true
        created_by_id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        revoked_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        last_used_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
      required:
      - created_at
      - created_by_id
      - environment_id
      - expires_at
      - id
      - last_used_at
      - name
      - organization_id
      - prefix
      - project_id
      - revoked_at
      - scopes
      - updated_at
    APIKeyAuthCheck:
      type: object
      properties:
        status:
          type: string
        organization_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        environment_id:
          type: string
          format: uuid
        scopes:
          type: array
          items:
            type: string
      required:
      - environment_id
      - organization_id
      - project_id
      - scopes
      - status
    APIKeyCreateRequest:
      type: object
      description: API key creation request
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        scopes:
          type: array
          items:
            $ref: '#/components/schemas/APIKeyScopeEnum'
          default:
          - traces:write
        expires_at:
          type: string
          format: date-time
          nullable: true
      required:
      - name
    APIKeyCreationResponse:
      type: object
      description: Serialization response to API key creation
      properties:
        api_key:
          type: string
          readOnly: true
        record:
          allOf:
          - $ref: '#/components/schemas/APIKey'
          readOnly: true
      required:
      - api_key
      - record
    APIKeyScopeEnum:
      enum:
      - traces:write
      - traces:read
      - evaluations:run
      - datasets:read
      - ci:read
      type: string
      description: |-
        * `traces:write` - Write traces
        * `traces:read` - Read traces
        * `evaluations:run` - Run evaluations
        * `datasets:read` - Read datasets
        * `ci:read` - Read CI data
    CaptureModeEnum:
      enum:
      - metadata_only
      - redacted
      - full
      type: string
      description: |-
        * `metadata_only` - Metadata only
        * `redacted` - Redacted
        * `full` - Full
    Environment:
      type: object
      description: Environment API representation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization_id:
          type: string
          format: uuid
          readOnly: true
        project_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-\w]+$
        environment_type:
          allOf:
          - $ref: '#/components/schemas/EnvironmentTypeEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ResourceStatusEnum'
          readOnly: true
        capture_mode_override:
          allOf:
          - $ref: '#/components/schemas/CaptureModeEnum'
          readOnly: true
        retention_days_override:
          type: integer
          readOnly: true
          nullable: true
        effective_capture_mode:
          type: string
          readOnly: true
        effective_retention_days:
          type: integer
          readOnly: true
        created_by_id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - capture_mode_override
      - created_at
      - created_by_id
      - effective_capture_mode
      - effective_retention_days
      - environment_type
      - id
      - name
      - organization_id
      - project_id
      - retention_days_override
      - slug
      - status
      - updated_at
    EnvironmentCreateRequest:
      type: object
      description: Environment creation request.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        slug:
          type: string
          minLength: 1
          maxLength: 63
          pattern: ^[-\w]+$
        environment_type:
          allOf:
          - $ref: '#/components/schemas/EnvironmentTypeEnum'
          default: custom
        capture_mode_override:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CaptureModeEnum'
          - $ref: '#/components/schemas/NullEnum'
        retention_days_override:
          type: integer
          maximum: 3650
          minimum: 1
          nullable: true
      required:
      - name
    EnvironmentTypeEnum:
      enum:
      - development
      - staging
      - production
      - custom
      type: string
      description: |-
        * `development` - Development
        * `staging` - Staging
        * `production` - Production
        * `custom` - Custom
    Invitation:
      type: object
      description: Invitation response representation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/InvitationRoleEnum'
          readOnly: true
        invited_by:
          allOf:
          - $ref: '#/components/schemas/UserSummary'
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
        accepted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        revoked_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - accepted_at
      - created_at
      - email
      - expires_at
      - id
      - invited_by
      - revoked_at
      - role
    InvitationAcceptRequest:
      type: object
      description: Accept an invitation using its plaintext token.
      properties:
        token:
          type: string
          minLength: 20
          maxLength: 256
      required:
      - token
    InvitationCreateRequest:
      type: object
      description: Create an organization invitation.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        role:
          $ref: '#/components/schemas/InvitationRoleEnum'
      required:
      - email
      - role
    InvitationRoleEnum:
      enum:
      - administrator
      - developer
      - viewer
      type: string
      description: |-
        * `administrator` - Administrator
        * `developer` - Developer
        * `viewer` - Viewer
    Membership:
      type: object
      description: Organization membership representation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization:
          allOf:
          - $ref: '#/components/schemas/Organization'
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/UserSummary'
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/MembershipRoleEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/OrganizationStatusEnum'
          readOnly: true
        joined_at:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - joined_at
      - organization
      - role
      - status
      - updated_at
      - user
    MembershipRoleEnum:
      enum:
      - owner
      - administrator
      - developer
      - viewer
      type: string
      description: |-
        * `owner` - Owner
        * `administrator` - Administrator
        * `developer` - Developer
        * `viewer` - Viewer
    NullEnum:
      enum:
      - null
    Organization:
      type: object
      description: Organization response representation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-\w]+$
        status:
          allOf:
          - $ref: '#/components/schemas/OrganizationStatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - slug
      - status
      - updated_at
    OrganizationCreateRequest:
      type: object
      description: Create-organization request.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        slug:
          type: string
          minLength: 1
          maxLength: 63
      required:
      - name
    OrganizationStatusEnum:
      enum:
      - active
      - suspended
      type: string
      description: |-
        * `active` - Active
        * `suspended` - Suspended
    PatchedEnvironmentUpdateRequest:
      type: object
      description: Mutable environment configuration.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        environment_type:
          $ref: '#/components/schemas/EnvironmentTypeEnum'
        status:
          $ref: '#/components/schemas/ResourceStatusEnum'
        capture_mode_override:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/CaptureModeEnum'
          - $ref: '#/components/schemas/NullEnum'
        retention_days_override:
          type: integer
          maximum: 3650
          minimum: 1
          nullable: true
    PatchedMembershipUpdateRequest:
      type: object
      description: Update a membership role or status.
      properties:
        role:
          $ref: '#/components/schemas/MembershipRoleEnum'
        status:
          $ref: '#/components/schemas/OrganizationStatusEnum'
    PatchedProjectUpdateRequest:
      type: object
      description: Mutable project configuration.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        description:
          type: string
        status:
          $ref: '#/components/schemas/ResourceStatusEnum'
        capture_mode:
          $ref: '#/components/schemas/CaptureModeEnum'
        retention_days:
          type: integer
          maximum: 3650
          minimum: 1
    Project:
      type: object
      description: Project API representation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-\w]+$
        description:
          type: string
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/ResourceStatusEnum'
          readOnly: true
        capture_mode:
          allOf:
          - $ref: '#/components/schemas/CaptureModeEnum'
          readOnly: true
        retention_days:
          type: integer
          readOnly: true
        created_by_id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - capture_mode
      - created_at
      - created_by_id
      - description
      - id
      - name
      - organization_id
      - retention_days
      - slug
      - status
      - updated_at
    ProjectCreateRequest:
      type: object
      description: Project creation request.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        slug:
          type: string
          minLength: 1
          maxLength: 63
          pattern: ^[-\w]+$
        description:
          type: string
          default: ''
        capture_mode:
          allOf:
          - $ref: '#/components/schemas/CaptureModeEnum'
          default: redacted
        retention_days:
          type: integer
          maximum: 3650
          minimum: 1
          default: 30
      required:
      - name
    ProjectCreationResponse:
      type: object
      description: Project creation response with default environment.
      properties:
        project:
          allOf:
          - $ref: '#/components/schemas/Project'
          readOnly: true
        default_environment:
          allOf:
          - $ref: '#/components/schemas/Environment'
          readOnly: true
      required:
      - default_environment
      - project
    ResourceStatusEnum:
      enum:
      - active
      - archived
      type: string
      description: |-
        * `active` - Active
        * `archived` - Archived
    StatusResponse:
      type: object
      description: Schema for the service status response.
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
      required:
      - service
      - status
      - version
    UserSummary:
      type: object
      description: Minimal member user representation.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        display_name:
          type: string
          readOnly: true
      required:
      - display_name
      - email
      - id
  securitySchemes:
    EnvironmentAPIKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: AgentProof API key
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
