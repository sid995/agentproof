openapi: 3.0.3
info:
  title: AgentProof API
  version: 0.1.0
  description: Reliability, evaluation, observability, and governance API for AI applications.
paths:
  /api/v1/environments/{environment_id}/:
    get:
      operationId: environments_retrieve
      description: Retrieve or update an environment.
      parameters:
      - in: path
        name: environment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - environments
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
          description: ''
    patch:
      operationId: environments_partial_update
      description: Retrieve or update an environment.
      parameters:
      - in: path
        name: environment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - environments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedEnvironmentUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedEnvironmentUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedEnvironmentUpdateRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
          description: ''
  /api/v1/invitations/accept/:
    post:
      operationId: invitations_accept_create
      description: Accept an organization invitation.
      tags:
      - invitations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
          description: ''
  /api/v1/organizations/:
    get:
      operationId: organizations_list
      description: List memberships or create an organization.
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Membership'
          description: ''
    post:
      operationId: organizations_create
      description: List memberships or create an organization.
      tags:
      - organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
          description: ''
  /api/v1/organizations/{organization_id}/:
    get:
      operationId: organizations_retrieve
      description: Return the currently selected organization.
      parameters:
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
          description: ''
  /api/v1/organizations/{organization_id}/invitations/:
    get:
      operationId: organizations_invitations_list
      description: List or create organization invitations.
      parameters:
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invitation'
          description: ''
    post:
      operationId: organizations_invitations_create
      description: List or create organization invitations.
      parameters:
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/InvitationCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/InvitationCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
          description: ''
  /api/v1/organizations/{organization_id}/invitations/{invitation_id}/revoke/:
    post:
      operationId: organizations_invitations_revoke_create
      description: Revoke an unresolved invitation.
      parameters:
      - in: path
        name: invitation_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
          description: ''
  /api/v1/organizations/{organization_id}/members/:
    get:
      operationId: organizations_members_list
      description: List members in the current organization.
      parameters:
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Membership'
          description: ''
  /api/v1/organizations/{organization_id}/members/{membership_id}/:
    patch:
      operationId: organizations_members_partial_update
      description: Update or remove one membership.
      parameters:
      - in: path
        name: membership_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedMembershipUpdateRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
          description: ''
    delete:
      operationId: organizations_members_destroy
      description: Update or remove one membership.
      parameters:
      - in: path
        name: membership_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/organizations/{organization_id}/switch/:
    post:
      operationId: organizations_switch_create
      description: Set an organization as the active session tenant.
      parameters:
      - in: path
        name: organization_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
          description: ''
  /api/v1/organizations/current/:
    get:
      operationId: organizations_current_retrieve
      description: Return the selected organization membership.
      tags:
      - organizations
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membership'
          description: ''
  /api/v1/projects/:
    get:
      operationId: projects_list
      description: List or create projects for the active organization
      tags:
      - projects
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
          description: ''
    post:
      operationId: projects_create
      description: List or create projects for the active organization
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
  /api/v1/projects/{project_id}/:
    get:
      operationId: projects_retrieve
      description: Retrieve or update a project.
      parameters:
      - in: path
        name: project_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
    patch:
      operationId: projects_partial_update
      description: Retrieve or update a project.
      parameters:
      - in: path
        name: project_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProjectUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProjectUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProjectUpdateRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
          description: ''
  /api/v1/projects/{project_id}/environments/:
    get:
      operationId: projects_environments_list
      description: List or create environments under a project.
      parameters:
      - in: path
        name: project_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Environment'
          description: ''
    post:
      operationId: projects_environments_create
      description: List or create environments under a project.
      parameters:
      - in: path
        name: project_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnvironmentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/EnvironmentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/EnvironmentCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Environment'
          description: ''
  /api/v1/status/:
    get:
      operationId: get_service_status
      description: Return the public API status
      tags:
      - status
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
          description: ''
components:
  schemas:
    BlankEnum:
      enum:
      - ''
    CaptureModeEnum:
      enum:
      - metadata_only
      - redacted
      - full
      type: string
      description: |-
        * `metadata_only` - Metadata only
        * `redacted` - Redacted
        * `full` - Full
    Environment:
      type: object
      description: Environment response representation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        project_id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        environment_type:
          allOf:
          - $ref: '#/components/schemas/EnvironmentTypeEnum'
          readOnly: true
        capture_mode_override:
          allOf:
          - $ref: '#/components/schemas/CaptureModeEnum'
          readOnly: true
        retention_days_override:
          type: integer
          readOnly: true
          nullable: true
        effective_capture_mode:
          type: string
          readOnly: true
        effective_retention_days:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - capture_mode_override
      - created_at
      - effective_capture_mode
      - effective_retention_days
      - environment_type
      - id
      - name
      - project_id
      - retention_days_override
      - slug
      - updated_at
    EnvironmentCreateRequest:
      type: object
      description: Create-environment request.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        slug:
          type: string
          minLength: 1
          maxLength: 63
        environment_type:
          allOf:
          - $ref: '#/components/schemas/EnvironmentTypeEnum'
          default: development
        capture_mode_override:
          default: ''
          oneOf:
          - $ref: '#/components/schemas/CaptureModeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        retention_days_override:
          type: integer
          minimum: 1
          nullable: true
      required:
      - name
    EnvironmentTypeEnum:
      enum:
      - development
      - staging
      - production
      - custom
      type: string
      description: |-
        * `development` - Development
        * `staging` - Staging
        * `production` - Production
        * `custom` - Custom
    Invitation:
      type: object
      description: Invitation response representation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/InvitationRoleEnum'
          readOnly: true
        invited_by:
          allOf:
          - $ref: '#/components/schemas/UserSummary'
          readOnly: true
        expires_at:
          type: string
          format: date-time
          readOnly: true
        accepted_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        revoked_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - accepted_at
      - created_at
      - email
      - expires_at
      - id
      - invited_by
      - revoked_at
      - role
    InvitationAcceptRequest:
      type: object
      description: Accept an invitation using its plaintext token.
      properties:
        token:
          type: string
          minLength: 20
          maxLength: 256
      required:
      - token
    InvitationCreateRequest:
      type: object
      description: Create an organization invitation.
      properties:
        email:
          type: string
          format: email
          minLength: 1
        role:
          $ref: '#/components/schemas/InvitationRoleEnum'
      required:
      - email
      - role
    InvitationRoleEnum:
      enum:
      - administrator
      - developer
      - viewer
      type: string
      description: |-
        * `administrator` - Administrator
        * `developer` - Developer
        * `viewer` - Viewer
    Membership:
      type: object
      description: Organization membership representation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        organization:
          allOf:
          - $ref: '#/components/schemas/Organization'
          readOnly: true
        user:
          allOf:
          - $ref: '#/components/schemas/UserSummary'
          readOnly: true
        role:
          allOf:
          - $ref: '#/components/schemas/MembershipRoleEnum'
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        joined_at:
          type: string
          format: date-time
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - joined_at
      - organization
      - role
      - status
      - updated_at
      - user
    MembershipRoleEnum:
      enum:
      - owner
      - administrator
      - developer
      - viewer
      type: string
      description: |-
        * `owner` - Owner
        * `administrator` - Administrator
        * `developer` - Developer
        * `viewer` - Viewer
    Organization:
      type: object
      description: Organization response representation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-\w]+$
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - slug
      - status
      - updated_at
    OrganizationCreateRequest:
      type: object
      description: Create-organization request.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        slug:
          type: string
          minLength: 1
          maxLength: 63
      required:
      - name
    PatchedEnvironmentUpdateRequest:
      type: object
      description: Update-environment request.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        environment_type:
          $ref: '#/components/schemas/EnvironmentTypeEnum'
        capture_mode_override:
          oneOf:
          - $ref: '#/components/schemas/CaptureModeEnum'
          - $ref: '#/components/schemas/BlankEnum'
        retention_days_override:
          type: integer
          minimum: 1
          nullable: true
    PatchedMembershipUpdateRequest:
      type: object
      description: Update a membership role or status.
      properties:
        role:
          $ref: '#/components/schemas/MembershipRoleEnum'
        status:
          $ref: '#/components/schemas/StatusEnum'
    PatchedProjectUpdateRequest:
      type: object
      description: Update-project request.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        description:
          type: string
        capture_mode:
          $ref: '#/components/schemas/CaptureModeEnum'
        retention_days:
          type: integer
          minimum: 1
    Project:
      type: object
      description: Project response representation.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
          readOnly: true
        capture_mode:
          allOf:
          - $ref: '#/components/schemas/CaptureModeEnum'
          readOnly: true
        retention_days:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - capture_mode
      - created_at
      - description
      - id
      - name
      - retention_days
      - slug
      - updated_at
    ProjectCreateRequest:
      type: object
      description: Create-project request.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 150
        slug:
          type: string
          minLength: 1
          maxLength: 63
        description:
          type: string
        capture_mode:
          allOf:
          - $ref: '#/components/schemas/CaptureModeEnum'
          default: redacted
        retention_days:
          type: integer
          minimum: 1
          default: 30
      required:
      - name
    StatusEnum:
      enum:
      - active
      - suspended
      type: string
      description: |-
        * `active` - Active
        * `suspended` - Suspended
    StatusResponse:
      type: object
      description: Schema for the service status response.
      properties:
        status:
          type: string
        service:
          type: string
        version:
          type: string
      required:
      - service
      - status
      - version
    UserSummary:
      type: object
      description: Minimal member user representation.
      properties:
        id:
          type: integer
          readOnly: true
        email:
          type: string
          format: email
          readOnly: true
          title: Email address
        display_name:
          type: string
          readOnly: true
      required:
      - display_name
      - email
      - id
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
