name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.23"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-packages --all-groups --locked

      - name: Check formatting
        run: make format-check

      - name: Run linting
        run: make lint

      - name: Run type checking
        run: make type-check

      - name: Run Django system checks
        run: |
          uv run python backend/manage.py check \
            --settings=agentproof_backend.config.settings.test

      - name: Check for missing migrations
        run: |
          uv run python backend/manage.py makemigrations \
            --check \
            --dry-run \
            --settings=agentproof_backend.config.settings.test

      - name: Apply migrations
        run: |
          uv run python backend/manage.py migrate \
            --noinput \
            --settings=agentproof_backend.config.settings.test

      - name: Validate OpenAPI schema
        run: |
          uv run python backend/manage.py spectacular \
            --file docs/api/openapi.yml \
            --validate \
            --settings=agentproof_backend.config.settings.test

      - name: Run tests
        run: make test

      - name: Build SDK
        run: make build-sdk

      - name: Audit Python dependencies
        run: make audit
