default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: uv run ruff check --fix
        language: system
        types_or:
          - python
          - pyi

      - id: ruff-format
        name: Ruff format
        entry: uv run ruff format
        language: system
        types_or:
          - python
          - pyi

      - id: mypy
        name: mypy
        entry: uv run mypy backend/src packages/python-sdk/src
        language: system
        pass_filenames: false

      - id: detect-secrets
        name: Detect secrets
        entry: uv run detect-secrets-hook --baseline .secrets.baseline
        language: system
        types:
          - text
        exclude: ^(uv\.lock|\.secrets\.baseline)$

      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
        stages:
          - pre-push
