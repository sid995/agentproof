<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AgentProof{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fa;
        --panel: #ffffff;
        --border: #d9dee7;
        --text: #172033;
        --muted: #667085;
        --accent: #2755d9;
        --danger: #b42318;
        --success: #067647;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      pre {
        overflow: auto;
        padding: 0.75rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #f2f4f7;
        white-space: pre-wrap;
      }
      input, select, textarea, button {
        max-width: 100%;
        font: inherit;
      }
      input, select, textarea {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.45rem 0.55rem;
        background: #fff;
      }
      button, .button {
        display: inline-block;
        border: 1px solid var(--accent);
        border-radius: 6px;
        padding: 0.45rem 0.7rem;
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }
      .app-header {
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }
      .app-header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        max-width: 1180px;
        margin: 0 auto;
        padding: 0.8rem 1rem;
      }
      .app-nav {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .container {
        max-width: 1180px;
        margin: 0 auto;
        padding: 1rem;
      }
      .panel {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        padding: 1rem;
        margin: 1rem 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 1rem;
      }
      .filters {
        display: flex;
        align-items: end;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .filters label {
        display: grid;
        gap: 0.25rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
      .table-wrap { overflow-x: auto; }
      table {
        width: 100%;
        border-collapse: collapse;
        background: var(--panel);
      }
      th, td {
        border-bottom: 1px solid var(--border);
        padding: 0.65rem;
        text-align: left;
        vertical-align: top;
      }
      th {
        color: var(--muted);
        font-weight: 600;
        font-size: 0.85rem;
      }
      .muted { color: var(--muted); }
      .status-error { color: var(--danger); font-weight: 700; }
      .status-success { color: var(--success); font-weight: 700; }
      .badge {
        display: inline-block;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 0.1rem 0.45rem;
        margin: 0.1rem;
        font-size: 0.85rem;
        color: var(--muted);
      }
      .waterfall-track {
        position: relative;
        height: 0.7rem;
        min-width: 180px;
        border-radius: 999px;
        background: #eef2f6;
      }
      .waterfall-bar {
        position: absolute;
        top: 0;
        bottom: 0;
        min-width: 2px;
        border-radius: 999px;
        background: var(--accent);
      }
      .tree-name {
        display: inline-block;
      }
      .pagination {
        display: flex;
        gap: 0.75rem;
        margin: 1rem 0;
      }
      @media (max-width: 700px) {
        .app-header-inner {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <div class="app-header-inner">
        <strong>AgentProof</strong>
        <nav class="app-nav" aria-label="Main navigation">
          <a href="{% url 'project-web:project-list' %}">Projects</a>
          <a href="{% url 'trace-web:trace-list' %}">Traces</a>
          <a href="{% url 'api-docs' %}">API docs</a>
        </nav>
      </div>
    </header>
    <main class="container">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
